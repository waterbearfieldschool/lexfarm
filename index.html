<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Projects</title>
<style>
  :root {
    --bg: #f6f3ed;
    --card: #ffffff;
    --ink: #2c2723;
    --muted: #7a7167;
    --accent: #6b8e5a;
    --border: #e4ddd1;
    --shadow: 0 1px 3px rgba(44,39,35,.08), 0 6px 20px rgba(44,39,35,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.2rem 1.25rem 1rem;
  }
  header h1 {
    margin: 0 0 .35rem;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
  }
  header h1 a {
    color: var(--accent);
    text-decoration: none;
  }
  header h1 a:hover { text-decoration: underline; }
  header p {
    margin: 0;
    color: var(--muted);
    max-width: 46ch;
  }
  header p a {
    color: var(--accent);
    text-decoration: none;
  }
  header p a:hover { text-decoration: underline; }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem 1.25rem 4rem;
  }
  .grid {
    display: grid;
    gap: 1.1rem;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }
  /* Project cards are links */
  a.card {
    text-decoration: none;
    color: inherit;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  a.card:hover {
    transform: translateY(-3px);
    box-shadow: 0 2px 6px rgba(44,39,35,.1), 0 12px 30px rgba(44,39,35,.12);
  }
  .frame {
    position: relative;
    background: #efeae1;
    aspect-ratio: 4 / 3;
    overflow: hidden;
  }
  .frame img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    padding: 1rem;
    display: block;
    transition: transform .35s ease;
  }
  a.card:hover .frame img { transform: scale(1.03); }
  .caption {
    padding: .8rem .9rem 1.1rem;
    border-top: 1px solid var(--border);
  }
  .caption .title {
    font-weight: 600;
    font-size: 1rem;
    color: var(--accent);
    margin-bottom: .1rem;
  }
  .caption .text {
    color: var(--muted);
    font-size: .9rem;
  }
</style>
</head>
<body>
<header>
  <h1>Projects at <a href="https://lexfarm.org/">LexFarm</a></h1>
</header>

<main>
  <div class="grid">
    <a class="card" href="benches/index.html">
      <div class="frame">
        <img loading="lazy" src="benches/designs/bench3_white_together.png" alt="Benches project">
      </div>
      <div class="caption">
        <div class="title">Goatyard Benches</div>
        <div class="text">Designing and building simple benches to be used by goats and humans at LexFarm.</div>
      </div>
    </a>
  </div>
</main>
</body>
</html>
