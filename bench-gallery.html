<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bench Design Precedents</title>
<style>
  :root {
    --bg: #f6f3ed;
    --card: #ffffff;
    --ink: #2c2723;
    --muted: #7a7167;
    --accent: #6b8e5a;
    --border: #e4ddd1;
    --shadow: 0 1px 3px rgba(44,39,35,.08), 0 6px 20px rgba(44,39,35,.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2.2rem 1.25rem 1rem;
  }
  header h1 {
    margin: 0 0 .35rem;
    font-size: 1.6rem;
    letter-spacing: -0.01em;
  }
  header p {
    margin: 0;
    color: var(--muted);
    max-width: 46ch;
  }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1rem 1.25rem 4rem;
  }
  .grid {
    display: grid;
    gap: 1.1rem;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
  }
  .frame {
    position: relative;
    background: #efeae1;
    cursor: zoom-in;
    aspect-ratio: 4 / 3;
    overflow: hidden;
  }
  .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform .35s ease;
  }
  .frame:hover img { transform: scale(1.03); }
  .badge {
    position: absolute;
    top: .6rem;
    left: .6rem;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: .8rem;
    min-width: 1.7rem;
    height: 1.7rem;
    padding: 0 .5rem;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,.25);
  }
  .caption {
    padding: .7rem .9rem 1rem;
    border-top: 1px solid var(--border);
  }
  .caption .num {
    font-weight: 600;
    font-size: .85rem;
    color: var(--accent);
  }
  .caption .text {
    color: var(--muted);
    font-size: .9rem;
    min-height: 1.4em;
  }
  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(28,24,20,.92);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 50;
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 82vh;
    border-radius: 8px;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
  }
  .lightbox .lb-label {
    position: absolute;
    bottom: 1.1rem;
    left: 0;
    right: 0;
    text-align: center;
    color: #f6f3ed;
    font-size: .95rem;
  }
  .lightbox .close {
    position: absolute;
    top: 1rem;
    right: 1.1rem;
    color: #fff;
    font-size: 2rem;
    line-height: 1;
    background: none;
    border: none;
    cursor: pointer;
    opacity: .8;
  }
  .lightbox .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,.12);
    color: #fff;
    border: none;
    font-size: 1.8rem;
    width: 3rem;
    height: 3rem;
    border-radius: 999px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .lightbox .prev { left: .8rem; }
  .lightbox .next { right: .8rem; }
  footer {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 1.25rem 3rem;
    color: var(--muted);
    font-size: .85rem;
  }
</style>
</head>
<body>
<header>
  <h1>Bench Design Precedents</h1>
  <p>Reference images for a DIY farm bench to build together in a workshop with adults and kids.</p>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<footer>
  Lexfarm · bench workshop — precedent gallery
</footer>

<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose" aria-label="Close">&times;</button>
  <button class="nav prev" id="lbPrev" aria-label="Previous">&#8249;</button>
  <img id="lbImg" src="" alt="">
  <button class="nav next" id="lbNext" aria-label="Next">&#8250;</button>
  <div class="lb-label" id="lbLabel"></div>
</div>

<script>
  // Image files in benches/precedents, in order. Captions left blank for now.
  const images = [
    "Screenshot from 2026-07-04 08-59-38.png",
    "Screenshot from 2026-07-04 09-02-06.png",
    "Screenshot from 2026-07-04 09-11-05.png",
    "Screenshot from 2026-07-04 09-11-24.png",
    "Screenshot from 2026-07-04 09-12-09.png",
    "Screenshot from 2026-07-04 09-12-58.png",
    "Screenshot from 2026-07-04 09-14-11.png",
    "Screenshot from 2026-07-04 09-15-14.png"
  ];
  const captions = images.map(() => ""); // fill in later

  const base = "benches/precedents/";
  const grid = document.getElementById("grid");

  images.forEach((file, i) => {
    const n = i + 1;
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="frame" data-index="${i}">
        <span class="badge">${n}</span>
        <img loading="lazy" src="${base}${encodeURIComponent(file)}" alt="Bench precedent ${n}">
      </div>
      <div class="caption">
        <div class="num">Design ${n}</div>
        <div class="text">${captions[i] || "&nbsp;"}</div>
      </div>`;
    grid.appendChild(card);
  });

  // Lightbox
  const lb = document.getElementById("lightbox");
  const lbImg = document.getElementById("lbImg");
  const lbLabel = document.getElementById("lbLabel");
  let current = 0;

  function show(i) {
    current = (i + images.length) % images.length;
    lbImg.src = base + encodeURIComponent(images[current]);
    lbLabel.textContent = "Design " + (current + 1);
    lb.classList.add("open");
  }
  function close() { lb.classList.remove("open"); }

  grid.addEventListener("click", e => {
    const frame = e.target.closest(".frame");
    if (frame) show(parseInt(frame.dataset.index, 10));
  });
  document.getElementById("lbClose").addEventListener("click", close);
  document.getElementById("lbPrev").addEventListener("click", e => { e.stopPropagation(); show(current - 1); });
  document.getElementById("lbNext").addEventListener("click", e => { e.stopPropagation(); show(current + 1); });
  lb.addEventListener("click", e => { if (e.target === lb) close(); });
  document.addEventListener("keydown", e => {
    if (!lb.classList.contains("open")) return;
    if (e.key === "Escape") close();
    else if (e.key === "ArrowLeft") show(current - 1);
    else if (e.key === "ArrowRight") show(current + 1);
  });
</script>
</body>
</html>
